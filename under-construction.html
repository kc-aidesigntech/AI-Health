<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anderson Island Health — site update in progress.">
    <meta name="robots" content="noindex">
    <title>Under Construction — Anderson Island Health</title>
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon/favicon-512.png">
    <link rel="apple-touch-icon" href="assets/favicon/favicon-512.png">
    <meta name="theme-color" content="#0c7bbd">
    <style>
        :root { color-scheme: light; }
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e8f4fb, #f8eef1);
            color: #0c7bbd;
        }
        .uc-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
        }
        .uc-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 40px 32px;
            max-width: min(96vw, 920px);
            width: 100%;
            box-shadow: 0 14px 36px rgba(0,0,0,0.14);
            border: 1px solid rgba(0,0,0,0.04);
        }
        .uc-logo {
            display: block;
            width: min(88vw, 720px);
            max-width: 100%;
            height: auto;
            margin: 0 auto 28px;
        }
        .uc-title {
            font-size: 1.8rem;
            margin: 0 0 10px;
            color: #0c7bbd;
            letter-spacing: 0.02em;
        }
        .uc-sub {
            margin: 0;
            color: #2d3a4a;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
    <div class="uc-shell">
        <div class="uc-card">
            <img class="uc-logo" src="assets/AI Health Custom Logo v9.png" alt="Anderson Island Health logo">
            <h1 class="uc-title">Under Construction</h1>
            <p class="uc-sub">We are preparing something great. Please check back soon.</p>
        </div>
    </div>
</body>
</html>
