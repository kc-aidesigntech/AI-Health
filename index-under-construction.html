<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anderson Island Health — site update in progress.">
    <meta name="robots" content="noindex">
    <title>Under Construction — Anderson Island Health</title>
    <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg">
    <link rel="shortcut icon" href="assets/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="AI Health">

    <meta name="theme-color" content="#036474">
    <link rel="stylesheet" href="https://use.typekit.net/siy6qpg.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* UC page: no fixed header — reset body padding from global style.css */
        body.uc-page {
            padding-top: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f4fb, #f8eef1);
        }
        .uc-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
        }
        .uc-card {
            background: #ffffff;
            border-radius: var(--radius);
            padding: 40px 32px;
            max-width: min(96vw, 920px);
            width: 100%;
            box-shadow: 0 14px 36px rgba(0,0,0,0.14);
            border: 1px solid rgba(0,0,0,0.04);
        }
        .uc-logo {
            display: block;
            width: min(88vw, 720px);
            max-width: 100%;
            height: auto;
            margin: 0 auto 28px;
        }
        /* h1 uses global typography from style.css; brand color for this page */
        .uc-card h1 {
            color: var(--primary-teal);
            margin-bottom: 12px;
        }
        .uc-card .uc-sub {
            margin: 0;
            color: var(--dark-text);
            font-size: 1.02rem;
        }
    </style>
</head>
<body class="uc-page">
    <div class="uc-shell">
        <div class="uc-card">
            <img class="uc-logo" src="assets/AI Health Custom Logo v9.png" alt="Anderson Island Health logo">
            <h1>Under Construction</h1>
            <p class="uc-sub">We are preparing something great. Please check back soon, we're scheduled to launch April 1st!</p>
        </div>
    </div>
</body>
</html>
